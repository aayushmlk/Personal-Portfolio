<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="coolGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00FFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF00FF;stop-opacity:1" />
    </linearGradient>

    <filter id="neon" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(80,30)" filter="url(#neon)">
    
    <!-- A -->
    <path d="M 0,280 L 140,0 L 280,280 M 60,160 L 220,160"
          stroke="url(#coolGrad)"
          stroke-width="32"
          stroke-linecap="round"
          stroke-linejoin="round"/>

    <!-- M -->
    <path d="M 360,280 L 360,0 L 500,160 L 640,0 L 640,280"
          stroke="url(#coolGrad)"
          stroke-width="32"
          stroke-linecap="round"
          stroke-linejoin="round"/>
          
  </g>
</svg>